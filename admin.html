<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Trang Quản Trị - HI-TECH GEAR</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>
    <body class="bg-dark text-light">
        <div
            class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 border-bottom border-secondary"
        >
            <div class="container px-4">
                <div class="navbar-brand fw-bold text-info">
                    HỆ THỐNG QUẢN TRỊ ADMIN
                </div>
                <div class="d-flex">
                    <div
                        class="btn btn-outline-light btn-sm me-2"
                        onclick="window.location.href = 'home.html'"
                    >
                        Xem Trang Chủ
                    </div>
                    <div class="btn btn-danger btn-sm" onclick="handleLogout()">
                        Đăng xuất
                    </div>
                </div>
            </div>
        </div>

        <div class="container px-4">

                <div class="col-md-12">
                    <div
                        class="card d-flex flex-column justify-content-between p-4 shadow-lg border border-secondary bg-dark text-light rounded-3 table-responsive"
                        style="height: 550px;"
                    >
                        <div>
                            <div class="fs-4 fw-bold text-info mb-3">
                                DANH SÁCH HÀNG TRONG KHO
                            </div>
                            <table
                                class="table table-dark table-hover align-middle border-secondary"
                            >
                                <thead>
                                    <tr class="table-secondary text-dark">
                                        <th>Ảnh</th>
                                        <th>Tên Sản Phẩm</th>
                                        <th>Danh Mục</th>
                                        <th>Giá Bán</th>
                                        <th class="text-center">Hành Động</th>
                                    </tr>
                                </thead>
                                <tbody id="admin-table-body"></tbody>
                            </table>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <div id="page-info" class="text-secondary small">Trang 1 / 1</div>
                            <div class="pagination-buttons">
                                <button id="btn-prev" class="btn btn-outline-light btn-sm me-2" disabled>Prev</button>
                                <button id="btn-next" class="btn btn-outline-light btn-sm" disabled>Next</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="./js/page/admin.js"></script>
        <script src="./js/auth.js"></script>
    </body>
</html>
